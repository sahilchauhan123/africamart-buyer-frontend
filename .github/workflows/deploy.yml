name: Deploy Buyer App

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.lasomaa.com/api/v1
        run: npm run build

      - name: Create deployment package
        run: tar -czf release.tar.gz .next public package.json package-lock.json next.config.ts tsconfig.json

      - name: Copy package via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "release.tar.gz"
          target: "/tmp/"

      - name: Extract and Restart on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /var/www/Lasomaa/buyer-app
            tar -xzf /tmp/release.tar.gz -C /var/www/Lasomaa/buyer-app/
            cd /var/www/Lasomaa/buyer-app/
            npm install --production
            
            # Clean up old process if it exists
            pm2 delete africamart-buyer || true
            
            # Start/Restart new process
            pm2 delete Lasomaa-buyer || true
            pm2 start npm --name "Lasomaa-buyer" -- start -- -p 3000
